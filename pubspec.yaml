name: to_do_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  flutter_colorpicker: ^1.1.0
  cupertino_icons: ^1.0.8
  image_picker: ^1.2.1
  firebase_storage: ^13.2.0
  intl: ^0.20.2
  flutter_riverpod: ^3.3.1
  connectivity_plus: ^7.1.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^3.0.1
  confetti: ^0.8.0
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^7.0.1
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  image_path: "assets/icon/lapis.png"
  android: true
  ios: true
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/lapis.png"
    background_color: "#607696"
    theme_color: "#386EBE"
  windows:
    generate: true
    image_path: "assets/icon/lapis.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icon/lapis.png"